version: "3.8"

services:
  mqtt-server:
    image: eclipse-mosquitto:2
    container_name: mqtt-broker
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - mqtt-net
    restart: unless-stopped

  mqtt-consumer:
    build:
      context: ./mqtt-consumer
      dockerfile: Dockerfile-mqtt-consumer
    container_name: mqtt-consumer
    env_file:
      - ./.env
    command: ["python", "-u", "mqtt-consumer.py"]
    depends_on:
      - mqtt-server
    networks:
      - mqtt-net
    restart: unless-stopped

networks:
  mqtt-net:
    driver: bridge